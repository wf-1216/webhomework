<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Microsoft yahei", serif;
    }
    li {
      list-style-type: none;
    }
    table {
      width: 1000px;
      border-collapse: collapse;
      border-color: #930;
      margin: 50px auto 0;
      user-select: none;
    }
    table tr td {
      width: 250px;
      height: 100px;
      text-align: center;
    }

    table tr.title td {
      height: 50px;
      background: #c36;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
    }

    table tr td img {
      height: 90px;
      margin: 0 auto;
    }

    table tr td.number span {
      display: inline-block;
      font-size: 12px;
      text-align: center;
    }

    table tr td.number span.down,
    table tr td.number span.add {
      width: 30px;
      height: 30px;
      background: #ddd;
      line-height: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    table tr td.number span.num {
      width: 50px;
      height: 28px;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      line-height: 28px;
      color: #c36;
    }

    .box {
      width: 1000px;
      height: 50px;
      background: #c36;
      margin: 10px auto;
    }

    .box p {
      float: right;
      width: 250px;
      height: 50px;
      line-height: 50px;
      color: #fff;
      font-size: 14px;
    }

    .box p span {
      color: #f4e5a9;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <table border="1">
    <tbody>
      <tr class="title">
        <td>商品</td>
        <td>单价</td>
        <td>数量</td>
        <td>小计</td>
      </tr>
      <tr>
        <td><img src="./11_购物车作业_files/O1CN01bN8Fz725JLGt79Qa5_!!3136807505.jpg_Q75.jpg_.webp" alt=""></td>
        <td class="price">38</td>
        <td class="number"><span class="down">-</span><span class="num">0</span><span class="add">+</span></td>
        <td class="total">0</td>
      </tr>
      <tr>
        <td><img src="./11_购物车作业_files/O1CN013URMjd23OGO3mN8UP_!!2822767245.png_.webp" alt=""></td>
        <td class="price">30</td>
        <td class="number"><span class="down">-</span><span class="num">0</span><span class="add">+</span></td>
        <td class="total">0</td>
      </tr>
      <tr>
        <td><img src="./11_购物车作业_files/O1CN01twesDM1W06D7LBGOp_!!711442725.jpg_Q75.jpg_.webp" alt=""></td>
        <td class="price">5</td>
        <td class="number"><span class="down">-</span><span class="num">0</span><span class="add">+</span></td>
        <td class="total">0</td>
      </tr>
      <tr>
        <td><img src="./11_购物车作业_files/O1CN01MtI5wQ1K3VVkbqHaR_!!2209648361108.jpg_Q75.jpg_.webp" alt=""></td>
        <td class="price">9</td>
        <td class="number"><span class="down">-</span><span class="num">0</span><span class="add">+</span></td>
        <td class="total">0</td>
      </tr>
    </tbody>
  </table>
  <div class="box">
    <p class="totalPrice">合计费用： <span>0</span> ￥</p>
    <p class="totalNum">已选中商品： <span>0</span> 个</p>
  </div>
  <script src="./11_购物车作业_files/price.js.下载"></script>


</body></html>
